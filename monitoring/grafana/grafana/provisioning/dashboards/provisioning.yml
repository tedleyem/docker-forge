apiVersion: 1

providers:
  - name: 'Infrastructure Dashboards'
    orgId: 1
    folder: 'Infrastructure'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/infrastructure
      jsonData:
        graph_tooltip: 1
  - name: 'Applications Dashboards'
    orgId: 1
    folder: 'Core Applications'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/applications
      jsonData:
        graph_tooltip: 2
  - name: 'Security Dashboards'
    orgId: 1
    folder: 'Security'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/security
      jsonData:
        graph_tooltip: 3