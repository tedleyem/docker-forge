apiVersion: 1

datasources:
  # PROMETHEUS
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: PROMETHEUS_LOCAL

  # INFLUXDB
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: metrics_db
    user: admin
    secureJsonData:
      password: admin
    jsonData:
      httpMode: GET